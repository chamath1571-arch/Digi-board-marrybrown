name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build:shared

      - name: Build Dashboard
        run: npm run build:dashboard

      - name: Build POS
        run: npm run build:pos

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          cp -r apps/dashboard/dist _site/dashboard
          cp -r apps/pos/dist _site/pos
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=./dashboard/"><title>MarryBrown DigiBoard</title></head><body><p>Redirecting to <a href="./dashboard/">Dashboard</a>...</p></body></html>' > _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4